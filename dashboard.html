<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BookCEC</title>

    <!-- GUARD DE SESIÓN: si no hay usuario logueado, regresa al login -->
    <script>
        (function () {
            const usuarioActivo = localStorage.getItem('bookcecUsuarioActivo');
            if (!usuarioActivo) {
                window.location.href = 'sign_in.html';
            }
        })();
    </script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Bootstrap JS (necesario para el modal de "Publicar") -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Estilos propios -->
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            <h2>Book<span>CEC</span></h2>
        </div>

        <a href="#" class="active-link">
            <i class="bi bi-house-door-fill"></i>
            Inicio
        </a>

        <a href="#">
            <i class="bi bi-book-fill"></i>
            Libros
        </a>

        <a href="#">
            <i class="bi bi-cart-fill"></i>
            Ventas
        </a>

        <a href="#">
            <i class="bi bi-people-fill"></i>
            Usuarios
        </a>

        <a href="#">
            <i class="bi bi-bar-chart-fill"></i>
            Reportes
        </a>

        <a href="#" id="btnCerrarSesion">
            <i class="bi bi-box-arrow-right"></i>
            Cerrar Sesión
        </a>

    </div>

    <!-- MAIN -->

    <div class="main-content">

        <!-- TOPBAR -->

        <div class="topbar">

            <div>
                <h3>Dashboard BookCEC</h3>
                <p>Panel administrativo del marketplace</p>
            </div>

            <div class="perfil">
                <img src="https://i.pravatar.cc/100" alt="">
                <strong id="nombreUsuarioTopbar">Administrador</strong>
            </div>

        </div>

        <!-- CARDS -->

        <div class="cards-grid">

            <div class="dashboard-card card-1">

                <i class="bi bi-book-half"></i>

                <h2 id="cardTotalLibros">0</h2>

                <p>Total de Libros</p>

            </div>

            <div class="dashboard-card card-2">

                <i class="bi bi-cart-check-fill"></i>

                <h2 id="cardVentas">0</h2>

                <p>Ventas Realizadas</p>

            </div>

            <div class="dashboard-card card-4">

                <i class="bi bi-currency-dollar"></i>

                <h2 id="cardIngresos">$0</h2>

                <p>Ingresos Totales</p>

            </div>

        </div>

        <!-- GRAFICO -->

        <div class="chart-section">

            <h4>Ventas por Nivel</h4>

            <canvas id="ventasChart"></canvas>

        </div>

        <!-- TABLA -->

        <div class="table-section">

            <div class="table-section-header">
                <h4>Libros Publicados</h4>
                <button type="button" class="btn-publicar" id="btnPublicar"
                    data-bs-toggle="modal" data-bs-target="#modalPublicar">
                    <i class="bi bi-plus-lg"></i> Publicar
                </button>
            </div>

            <!-- FILTROS -->
            <div class="row g-2 mb-3 filtros-tabla">

                <div class="col-md-6">
                    <input type="text" id="buscarLibro" class="form-control"
                        placeholder="Buscar libro por nombre...">
                </div>

                <div class="col-md-3">
                    <select id="filtroNivel" class="form-select">
                        <option value="todos">Todos los niveles</option>
                        <option value="A1">A1</option>
                        <option value="A2">A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                        <option value="C2">C2</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="filtroEstado" class="form-select">
                        <option value="todos">Todos los estados</option>
                        <option value="Disponible">Disponible</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="Vendido">Vendido</option>
                    </select>
                </div>

            </div>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-success">

                        <tr>
                            <th>Libro</th>
                            <th>Nivel</th>
                            <th>Condición</th>
                            <th>Precio</th>
                            <th>Estado</th>
                        </tr>

                    </thead>

                    <tbody id="tablaLibros">
                        <!-- Filas generadas dinámicamente por dashboard.js -->
                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- MODAL: PUBLICAR NUEVO LIBRO -->

    <div class="modal fade" id="modalPublicar" tabindex="-1" aria-labelledby="modalPublicarLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalPublicarLabel">Publicar nuevo libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>

                <div class="modal-body">
                    <form id="formPublicar">

                        <div class="mb-3 text-center">
                            <img id="previewFoto" src="" alt="Vista previa" class="preview-foto d-none">
                            <label for="fotoLibro" class="form-label d-block mt-2">Foto del libro</label>
                            <input type="file" class="form-control" id="fotoLibro" accept="image/*">
                        </div>

                        <div class="mb-3">
                            <label for="nombreLibro" class="form-label">Nombre del libro</label>
                            <input type="text" class="form-control" id="nombreLibro"
                                placeholder="Ej. Interchange 5th Edition" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nivelLibro" class="form-label">Nivel</label>
                                <select class="form-select" id="nivelLibro" required>
                                    <option value="" disabled selected>Selecciona...</option>
                                    <option value="A1">A1</option>
                                    <option value="A2">A2</option>
                                    <option value="B1">B1</option>
                                    <option value="B2">B2</option>
                                    <option value="C1">C1</option>
                                    <option value="C2">C2</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="condicionLibro" class="form-label">Condición</label>
                                <select class="form-select" id="condicionLibro" required>
                                    <option value="" disabled selected>Selecciona...</option>
                                    <option value="Nuevo">Nuevo</option>
                                    <option value="Usado">Usado</option>
                                    <option value="Subrayado">Subrayado</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="precioLibro" class="form-label">Precio ($)</label>
                            <input type="number" class="form-control" id="precioLibro"
                                min="1" step="0.5" placeholder="Ej. 15" required>
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="formPublicar" class="btn-publicar">
                        <i class="bi bi-check-lg"></i> Publicar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- DATOS COMPARTIDOS CON EL MARKETPLACE -->
    <script src="book-store.js"></script>

    <!-- SCRIPT PROPIO -->
    <script src="dashboard.js"></script>

</body>

</html>
