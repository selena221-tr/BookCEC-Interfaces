<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles-sign-in.css">
    <title>Sign in - BookCEC</title>
</head>
<body>
    <header class="cosasInicio">
        <a href="index.html">Inicio</a>
        <a href="index.html#categorias">Explorar libros</a>
        <a href = "login.html" >Crear cuenta</a>
    </header>

    <main class="bienve">

        <div class="fila-superior">
            <img src="imagenes/logo.png" class="libro-img">
            <div class="text">
                <h1>Bienvenido</h1>
                <p>Por favor, inicie sesión con su correo electrónico</p>
            </div>
            <img src="imagenes/logo.png" class="libro-img">
        </div>

        <div class="ingres">
            <form class="formula">
                <div class="input-group">
                    <span class="icon">✉</span>
                    <input type="email" placeholder="Ingrese su correo electrónico">
                </div>
                
                <div class="input-group">
                    <span class="icon">🔒</span>
                    <input type="password" placeholder="Ingrese su contraseña">
                </div>

                <label class="checkbox-container"><input type="checkbox"> Sesion iniciada</label>

                <button type="submit" class="btn-iniciar">Iniciar sesión ✎</button>
            </form>
        </div>
    </main>
</body>
</html>
