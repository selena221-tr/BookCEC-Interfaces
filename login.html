<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>inicio</title>
</head>
<body>
    <section class="login">
        <section class="img-registro">
            <h1>BookCEC</h1>
        </section>
        <section class="campos">
            <h1>Registrate</h1>
            <p>Crea tu cuenta, te llevará menos de un minuto<br> Si ya tienes una cuenta <strong><a href="login.html">Inicia Sesión</a></strong></p>
                <form action="" id="nuevo">
                    <input type="text" placeholder="Nombres Completos" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Contraseña" required>
                    <input type="password" placeholder="Confirmar contraseña" required>
                    <button type="submit">¡Hecho!</button>
                </form>
            <section class="redes">
                <p>O inicia Sesión con redes sociales</p>
                <section class="iconos">
                    <img src="imagenes/facebook.png" alt="face">
                    <img src="imagenes/twitter.png" alt="face">
                    <img src="imagenes/instagram.png" alt="face">
                </section>    
            </section>
            
        </section>
    </section>
    
    
</body>
</html>
