<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - BookCEC</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="marketplace.css">
</head>
<body>

   <header class="header">
    <div class="logo">
        <img src="imagenes/logo.png" alt="logo">
        <span>Book</span><strong>CEC</strong>
    </div>

    <!-- Cckbox oculto -->
    <input type="checkbox" id="menu-toggle">

    <!-- o hamburguesa -->
    <label for="menu-toggle" class="menu-icon">☰</label>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="index.html#nosotros">Nosotros</a></li>
            <li><a href="index.html#servicios">Servicios</a></li>
            <li><a href="index.html#contacto">Contacto</a></li>
            <li><a href="marketplace.html" class="btn-market">Marketplace</a></li>
            <li><a href="login.html" class="btn-login">Login</a></li>
        </ul>
    </nav>
</header>

    <main class="marketplace">
        <section class="market-hero">
            <h1>Marketplace de Libros</h1>
            <p>Encuentra libros usados del CEC según tu nivel y al mejor precio.</p>
        </section>

        <section class="market-filters">
            <input type="text" id="buscarLibroMarket" placeholder="Buscar libro..." class="search-input">

            <select id="filtroNivelMarket" class="filter-select">
                <option value="">Nivel</option>
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="B1">B1</option>
                <option value="B2">B2</option>
                <option value="C1">C1</option>
                <option value="C2">C2</option>
            </select>

            <select id="filtroCondicionMarket" class="filter-select">
                <option value="">Condición</option>
                <option value="Nuevo">Nuevo</option>
                <option value="Usado">Usado</option>
                <option value="Subrayado">Subrayado</option>
            </select>

            <select id="filtroPrecioMarket" class="filter-select">
                <option value="">Precio</option>
                <option value="0-10">$0 - $10</option>
                <option value="10-20">$10 - $20</option>
                <option value="20-50">$20 - $50</option>
            </select>

            <button id="btnFiltrar" class="btn-filtrar">Filtrar</button>
        </section>

        <!-- Las tarjetas ya no están quemadas: marketplace.js las
             genera dinámicamente a partir de book-store.js -->
        <section class="market-grid" id="marketGrid">
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Book CEC. Todos los derechos reservados.</p>
    </footer>

    <!-- Datos compartidos con el dashboard -->
    <script src="book-store.js"></script>
    <script src="marketplace.js"></script>

</body>
</html>
